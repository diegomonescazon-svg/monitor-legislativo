<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Legislativo — Sector Petrolero</title>
<style>
/* ── Reset & tokens ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:   #0f2744;
  --navy2:  #1a3a5c;
  --gold:   #c8972a;
  --gold2:  #f0b429;
  --red:    #c53030;
  --red-bg: #fff5f5;
  --amber:  #b7791f;
  --amb-bg: #fffbeb;
  --gray:   #4a5568;
  --gray-bg:#f7fafc;
  --border: #e2e8f0;
  --white:  #ffffff;
  --text:   #2d3748;
  --text2:  #718096;
  --shadow: 0 1px 4px rgba(0,0,0,.08);
  --radius: 8px;

  /* fuente → color */
  --c-hcdn:     #2b6cb0; --c-hcdn-bg:     #ebf8ff;
  --c-senado:   #276749; --c-senado-bg:   #f0fff4;
  --c-diputados:#553c9a; --c-diputados-bg:#faf5ff;
  --c-boletin:  #744210; --c-boletin-bg:  #fffaf0;
  --c-default:  #4a5568; --c-default-bg:  #f7fafc;
}

body { font-family: system-ui,-apple-system,sans-serif; background:#f0f4f8; color:var(--text); min-height:100vh; }

/* ── Header ─────────────────────────────────────────────────── */
header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  color: #fff;
  padding: .9rem 1.5rem;
  display: flex; align-items: center; gap: 1rem;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
  position: sticky; top: 0; z-index: 50;
}
.header-logo { font-size: 1.6rem; line-height: 1; }
.header-titles { flex: 1; }
.header-titles h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .01em; }
.header-titles p  { font-size: .75rem; color: #a0bcd8; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
.last-update { font-size: .72rem; color: #90b4d0; white-space: nowrap; }
#date-picker {
  padding: .35rem .65rem; border: 1px solid rgba(255,255,255,.25);
  border-radius: var(--radius); background: rgba(255,255,255,.1);
  color: #fff; font-size: .82rem; cursor: pointer;
}
#date-picker::-webkit-calendar-picker-indicator { filter: invert(1); }

/* ── Layout ─────────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 1.25rem;
  max-width: 1340px;
  margin: 1.25rem auto;
  padding: 0 1.25rem 2rem;
}
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
}

/* ── Sidebar ─────────────────────────────────────────────────── */
.sidebar { display: flex; flex-direction: column; gap: 1rem; }

.sidebar-card {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
}
.sidebar-card-header {
  background: var(--navy); color: #fff;
  padding: .6rem 1rem; font-size: .78rem; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase;
}
.sidebar-card-body { padding: .85rem 1rem; }

/* stat rows */
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: .4rem 0; }
.stat-row:not(:last-child) { border-bottom: 1px solid var(--border); }
.stat-label { font-size: .8rem; color: var(--text2); }
.stat-val   { font-size: .92rem; font-weight: 700; color: var(--navy); }
.stat-val.alta   { color: var(--red); }
.stat-val.media  { color: var(--amber); }

/* big stat */
.big-stat { text-align: center; padding: .5rem 0; }
.big-stat .num { font-size: 2.4rem; font-weight: 800; color: var(--navy); line-height: 1; }
.big-stat .lbl { font-size: .75rem; color: var(--text2); margin-top: .25rem; }

/* fuente pill */
.fuente-row { display: flex; align-items: center; gap: .5rem; padding: .35rem 0; }
.fuente-row:not(:last-child) { border-bottom: 1px solid var(--border); }
.fuente-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.fuente-name { font-size: .8rem; flex: 1; }
.fuente-count { font-size: .8rem; font-weight: 700; color: var(--navy); }

/* historial bars */
.hist-bar-wrap { display: flex; flex-direction: column; gap: 4px; }
.hist-row { display: flex; align-items: center; gap: 6px; }
.hist-date { font-size: .68rem; color: var(--text2); width: 50px; flex-shrink: 0; }
.hist-bar-outer { flex: 1; background: var(--border); border-radius: 3px; height: 10px; overflow: hidden; }
.hist-bar-inner { height: 100%; background: var(--navy2); border-radius: 3px; transition: width .3s; }
.hist-count { font-size: .68rem; color: var(--text2); width: 22px; text-align: right; flex-shrink: 0; }

/* ── Main ─────────────────────────────────────────────────────── */
.main { display: flex; flex-direction: column; gap: 1rem; min-width: 0; }

/* tabs */
.tabs { display: flex; gap: 0; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.tab-btn {
  flex: 1; padding: .65rem .5rem; border: none; background: none;
  font-size: .82rem; font-weight: 600; color: var(--text2);
  cursor: pointer; border-bottom: 3px solid transparent;
  transition: color .15s, border-color .15s;
}
.tab-btn:hover { color: var(--navy); }
.tab-btn.active { color: var(--navy); border-bottom-color: var(--gold); background: #f8fafc; }

/* source filter (tab 3) */
.source-filter { display: flex; gap: .4rem; flex-wrap: wrap; }
.src-btn {
  padding: 3px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--white); font-size: .78rem; cursor: pointer;
  transition: all .15s;
}
.src-btn.active { border-color: var(--navy); background: var(--navy); color: #fff; }

/* card list */
.card-list { display: flex; flex-direction: column; gap: .75rem; }

/* item card */
.item-card {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--shadow); border-left: 4px solid var(--border);
  padding: 1rem 1.15rem; transition: box-shadow .2s, transform .1s;
  cursor: pointer;
}
.item-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.12); transform: translateY(-1px); }
.item-card.alta  { border-left-color: var(--red); }
.item-card.media { border-left-color: var(--gold2); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: .75rem; margin-bottom: .5rem; }
.card-titulo { font-size: .9rem; font-weight: 600; line-height: 1.45; color: var(--text); }
.card-badges { display: flex; gap: .35rem; flex-wrap: wrap; flex-shrink: 0; }

.badge {
  display: inline-block; padding: 2px 9px; border-radius: 20px;
  font-size: .7rem; font-weight: 600; white-space: nowrap;
}
.badge-alta   { background: var(--red-bg);  color: var(--red);   border: 1px solid #fed7d7; }
.badge-media  { background: var(--amb-bg);  color: var(--amber); border: 1px solid #fbd38d; }
.badge-baja   { background: var(--gray-bg); color: var(--gray);  border: 1px solid var(--border); }

.badge-fuente-hcdn       { background: var(--c-hcdn-bg);     color: var(--c-hcdn); }
.badge-fuente-senado     { background: var(--c-senado-bg);   color: var(--c-senado); }
.badge-fuente-diputados  { background: var(--c-diputados-bg);color: var(--c-diputados); }
.badge-fuente-boletin-oficial { background: var(--c-boletin-bg); color: var(--c-boletin); }
.badge-fuente-default    { background: var(--c-default-bg);  color: var(--c-default); }

.card-resumen { font-size: .82rem; color: #555; line-height: 1.55; margin-bottom: .55rem; }
.card-impacto { font-size: .8rem; color: var(--text2); line-height: 1.5; margin-bottom: .5rem; }
.card-impacto strong { color: var(--navy); }

.kw-list { display: flex; gap: .3rem; flex-wrap: wrap; margin-bottom: .55rem; }
.kw-tag {
  background: #ebf4ff; color: #2c5282;
  border: 1px solid #bee3f8;
  padding: 1px 8px; border-radius: 10px;
  font-size: .68rem; font-weight: 500;
}

.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: .4rem; }
.card-date { font-size: .72rem; color: var(--text2); }
.card-link {
  font-size: .75rem; color: #2b6cb0; text-decoration: none;
  display: inline-flex; align-items: center; gap: 3px;
}
.card-link:hover { text-decoration: underline; }

/* empty / loading */
.state-msg { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: .9rem; }
.spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: .6rem; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Modal ───────────────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.55); z-index: 200;
  overflow-y: auto; padding: 2rem 1rem;
}
.modal-overlay.open { display: block; }
.modal {
  background: var(--white); border-radius: 10px;
  max-width: 680px; margin: 0 auto; padding: 1.75rem;
  position: relative; box-shadow: 0 20px 60px rgba(0,0,0,.25);
}
.modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: none; font-size: 1.4rem;
  cursor: pointer; color: var(--text2); line-height: 1;
}
.modal-close:hover { color: var(--text); }
.modal h2 { font-size: 1rem; line-height: 1.5; margin-bottom: 1rem; padding-right: 2rem; }
.modal-badges { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1rem; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-bottom: 1rem; }
.meta-cell { background: var(--gray-bg); border-radius: 6px; padding: .5rem .65rem; }
.meta-cell .mk { font-size: .7rem; color: var(--text2); margin-bottom: 2px; }
.meta-cell .mv { font-size: .82rem; color: var(--text); font-weight: 500; }
.modal-section { background: var(--gray-bg); border-radius: var(--radius); padding: .85rem 1rem; margin-top: .75rem; }
.modal-section h3 { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--navy); margin-bottom: .5rem; }
.modal-section p  { font-size: .83rem; line-height: 1.65; color: var(--text); }
.modal-link { display: inline-flex; align-items: center; gap: .3rem; margin-top: .75rem; font-size: .83rem; color: #2b6cb0; }
.modal-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────── -->
<header>
  <div class="header-logo">🛢️</div>
  <div class="header-titles">
    <h1>Monitor Legislativo — Sector Petrolero</h1>
    <p>Monitoreo automatizado de fuentes legislativas y Boletín Oficial</p>
  </div>
  <div class="header-right">
    <input type="date" id="date-picker">
    <span class="last-update" id="last-update">—</span>
  </div>
</header>

<!-- ── Layout ─────────────────────────────────────────────── -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="sidebar-card">
      <div class="sidebar-card-header">Hoy</div>
      <div class="sidebar-card-body">
        <div class="big-stat">
          <div class="num" id="s-total">—</div>
          <div class="lbl">items monitoreados</div>
        </div>
      </div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-card-header">Por relevancia</div>
      <div class="sidebar-card-body">
        <div class="stat-row"><span class="stat-label">🔴 Alta</span>   <span class="stat-val alta"  id="s-alta">—</span></div>
        <div class="stat-row"><span class="stat-label">🟡 Media</span>  <span class="stat-val media" id="s-media">—</span></div>
        <div class="stat-row"><span class="stat-label">⚪ Baja</span>   <span class="stat-val"       id="s-baja">—</span></div>
      </div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-card-header">Por fuente</div>
      <div class="sidebar-card-body" id="s-fuentes">
        <div class="stat-label" style="font-size:.78rem;color:var(--text2)">Sin datos</div>
      </div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-card-header">Historial 30 días</div>
      <div class="sidebar-card-body">
        <div class="hist-bar-wrap" id="hist-bars">
          <div class="stat-label" style="font-size:.78rem;color:var(--text2)">Cargando...</div>
        </div>
      </div>
    </div>

  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="todos"     onclick="cambiarTab(this)">Todos</button>
      <button class="tab-btn"        data-tab="alta"      onclick="cambiarTab(this)">🔴 Alta relevancia</button>
      <button class="tab-btn"        data-tab="por-fuente" onclick="cambiarTab(this)">Por fuente</button>
    </div>

    <!-- Filtro de fuente (solo visible en tab "por-fuente") -->
    <div class="source-filter" id="source-filter" style="display:none"></div>

    <!-- Lista de cards -->
    <div class="card-list" id="card-list">
      <div class="state-msg"><div class="spinner"></div><br>Cargando datos...</div>
    </div>

  </main>
</div>

<!-- ── Modal ───────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── Estado global ──────────────────────────────────────────────
let ITEMS      = [];   // items del run activo
let TAB        = 'todos';
let FUENTE_SEL = null; // filtro de fuente activo en tab "por-fuente"

// ── Utilidades ─────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hoy() {
  return new Date().toISOString().split('T')[0];
}

function fuenteKey(f) {
  return (f || '').toLowerCase().replace(/\s+/g, '-');
}

const FUENTE_LABELS = {
  hcdn: 'HCDN', senado: 'Senado', diputados: 'Diputados',
  'boletin-oficial': 'Boletín Oficial',
};
function fuenteLabel(f) { return FUENTE_LABELS[fuenteKey(f)] || f; }

function badgeFuente(f) {
  const k = fuenteKey(f);
  const cls = ['hcdn','senado','diputados','boletin-oficial'].includes(k)
    ? `badge-fuente-${k}` : 'badge-fuente-default';
  return `<span class="badge ${cls}">${esc(fuenteLabel(f))}</span>`;
}

function badgeRel(r) {
  const map = { alta: 'badge-alta', media: 'badge-media', baja: 'badge-badge' };
  const cls = map[r] || 'badge-baja';
  const icon = r === 'alta' ? '🔴' : r === 'media' ? '🟡' : '⚪';
  return `<span class="badge ${cls}">${icon} ${esc(r)}</span>`;
}

const FUENTE_COLORS = {
  hcdn: '#2b6cb0', senado: '#276749',
  diputados: '#553c9a', 'boletin-oficial': '#744210', default: '#4a5568',
};
function fuenteColor(f) { return FUENTE_COLORS[fuenteKey(f)] || FUENTE_COLORS.default; }

// ── Cargar datos ───────────────────────────────────────────────
async function cargarFecha(fecha) {
  showLoading();
  document.getElementById('last-update').textContent = 'Cargando...';

  try {
    // 1. Buscar runs de la fecha
    const runsRes = await fetch(`/api/runs?fecha=${fecha}`);
    const { data: runs } = await runsRes.json();

    if (!runs || runs.length === 0) {
      ITEMS = [];
      renderizarSidebar();
      renderizarCards();
      document.getElementById('last-update').textContent = `Sin datos para ${fecha}`;
      return;
    }

    // 2. Tomar el run más reciente y cargar sus items
    const runId = runs[0].id;
    const itemsRes = await fetch(`/api/items/${runId}`);
    const { data: items } = await itemsRes.json();
    ITEMS = items || [];

    renderizarSidebar();
    renderizarCards();
    document.getElementById('last-update').textContent =
      `Actualizado ${new Date().toLocaleTimeString('es-AR')} — run #${runId}`;
  } catch (e) {
    ITEMS = [];
    document.getElementById('card-list').innerHTML =
      `<div class="state-msg">Error cargando datos: ${esc(e.message)}</div>`;
    document.getElementById('last-update').textContent = 'Error';
  }
}

async function cargarHistorial() {
  try {
    const res  = await fetch('/api/runs/recent?dias=30');
    const { data } = await res.json();
    renderizarHistorial(data || []);
  } catch (_) {}
}

// ── Sidebar ────────────────────────────────────────────────────
function renderizarSidebar() {
  const total = ITEMS.length;
  const alta  = ITEMS.filter(i => i.relevancia === 'alta').length;
  const media = ITEMS.filter(i => i.relevancia === 'media').length;
  const baja  = ITEMS.filter(i => i.relevancia === 'baja').length;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-alta').textContent  = alta;
  document.getElementById('s-media').textContent = media;
  document.getElementById('s-baja').textContent  = baja;

  // Breakdown por fuente
  const porFuente = {};
  for (const i of ITEMS) {
    const k = fuenteKey(i.fuente);
    porFuente[k] = (porFuente[k] || 0) + 1;
  }

  const fEl = document.getElementById('s-fuentes');
  if (!Object.keys(porFuente).length) {
    fEl.innerHTML = '<div class="stat-label" style="font-size:.78rem;color:var(--text2)">Sin datos</div>';
    return;
  }
  fEl.innerHTML = Object.entries(porFuente)
    .sort((a, b) => b[1] - a[1])
    .map(([k, n]) => `
      <div class="fuente-row">
        <div class="fuente-dot" style="background:${fuenteColor(k)}"></div>
        <span class="fuente-name">${esc(fuenteLabel(k))}</span>
        <span class="fuente-count">${n}</span>
      </div>`)
    .join('');
}

function renderizarHistorial(runs) {
  const el = document.getElementById('hist-bars');
  if (!runs.length) { el.innerHTML = '<div class="stat-label" style="font-size:.78rem;color:var(--text2)">Sin historial</div>'; return; }

  // Agrupar por fecha
  const porDia = {};
  for (const r of runs) {
    const d = (r.fecha || r.created_at || '').slice(0, 10);
    if (d) porDia[d] = (porDia[d] || 0) + (r.items_guardados ?? r.total_items ?? 0);
  }

  const entradas = Object.entries(porDia).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 30);
  const maxVal   = Math.max(...entradas.map(e => e[1]), 1);

  el.innerHTML = entradas.map(([fecha, n]) => {
    const pct   = Math.round((n / maxVal) * 100);
    const label = fecha.slice(5); // MM-DD
    return `
      <div class="hist-row">
        <span class="hist-date">${label}</span>
        <div class="hist-bar-outer"><div class="hist-bar-inner" style="width:${pct}%"></div></div>
        <span class="hist-count">${n}</span>
      </div>`;
  }).join('');
}

// ── Tabs ───────────────────────────────────────────────────────
function cambiarTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  TAB = btn.dataset.tab;

  const sfEl = document.getElementById('source-filter');
  if (TAB === 'por-fuente') {
    sfEl.style.display = 'flex';
    renderizarSourceFilter();
  } else {
    sfEl.style.display = 'none';
    FUENTE_SEL = null;
  }
  renderizarCards();
}

function renderizarSourceFilter() {
  const fuentes = [...new Set(ITEMS.map(i => fuenteKey(i.fuente)))];
  const sfEl    = document.getElementById('source-filter');
  sfEl.innerHTML = fuentes.map(f => `
    <button class="src-btn ${FUENTE_SEL === f ? 'active' : ''}"
            onclick="selFuente('${f}')">${esc(fuenteLabel(f))}</button>`).join('');
}

function selFuente(f) {
  FUENTE_SEL = FUENTE_SEL === f ? null : f;
  renderizarSourceFilter();
  renderizarCards();
}

// ── Cards ──────────────────────────────────────────────────────
function itemsFiltrados() {
  if (TAB === 'alta')       return ITEMS.filter(i => i.relevancia === 'alta');
  if (TAB === 'por-fuente') return FUENTE_SEL ? ITEMS.filter(i => fuenteKey(i.fuente) === FUENTE_SEL) : ITEMS;
  return ITEMS;
}

function showLoading() {
  document.getElementById('card-list').innerHTML =
    '<div class="state-msg"><div class="spinner"></div><br>Cargando...</div>';
}

function renderizarCards() {
  const lista    = document.getElementById('card-list');
  const items    = itemsFiltrados();

  if (!items.length) {
    lista.innerHTML = '<div class="state-msg">Sin items para mostrar</div>';
    return;
  }

  lista.innerHTML = items.map((item, idx) => {
    const rel  = item.relevancia || 'baja';
    const kws  = (item.keywords_encontradas || '').split(',').map(k => k.trim()).filter(Boolean);
    const kwHtml = kws.map(k => `<span class="kw-tag">${esc(k)}</span>`).join('');

    return `
    <div class="item-card ${rel}" onclick="abrirModal(${idx})">
      <div class="card-top">
        <div class="card-titulo">${esc(item.titulo)}</div>
        <div class="card-badges">
          ${badgeFuente(item.fuente)}
          ${badgeRel(rel)}
        </div>
      </div>
      ${item.resumen
        ? `<div class="card-resumen">${esc(item.resumen)}</div>`
        : ''}
      ${item.impacto
        ? `<div class="card-impacto"><strong>Impacto sector:</strong> ${esc(item.impacto)}</div>`
        : ''}
      ${kwHtml ? `<div class="kw-list">${kwHtml}</div>` : ''}
      <div class="card-footer">
        <span class="card-date">📅 ${esc(item.fecha_publicacion || '—')}</span>
        ${item.url
          ? `<a class="card-link" href="${esc(item.url)}" target="_blank" rel="noopener"
               onclick="event.stopPropagation()">Ver fuente ↗</a>`
          : ''}
      </div>
    </div>`;
  }).join('');
}

// ── Modal ──────────────────────────────────────────────────────
function abrirModal(idx) {
  const item = itemsFiltrados()[idx];
  if (!item) return;

  const rel = item.relevancia || 'baja';
  const kws = (item.keywords_encontradas || '').split(',').map(k => k.trim()).filter(Boolean);

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-badges">
      ${badgeFuente(item.fuente)}
      ${badgeRel(rel)}
    </div>
    <h2>${esc(item.titulo)}</h2>
    <div class="modal-grid">
      <div class="meta-cell"><div class="mk">Fuente</div><div class="mv">${esc(fuenteLabel(item.fuente))}</div></div>
      <div class="meta-cell"><div class="mk">Fecha publicación</div><div class="mv">${esc(item.fecha_publicacion || '—')}</div></div>
      <div class="meta-cell"><div class="mk">Relevancia</div><div class="mv" style="text-transform:capitalize">${esc(rel)}</div></div>
      <div class="meta-cell"><div class="mk">Keywords</div><div class="mv">${esc(kws.join(', ') || '—')}</div></div>
    </div>
    ${item.resumen
      ? `<div class="modal-section"><h3>Resumen (IA)</h3><p>${esc(item.resumen)}</p></div>`
      : ''}
    ${item.impacto
      ? `<div class="modal-section"><h3>Impacto para el sector</h3><p>${esc(item.impacto)}</p></div>`
      : ''}
    ${item.texto_raw
      ? `<div class="modal-section"><h3>Texto original</h3><p>${esc(item.texto_raw.slice(0, 800))}${item.texto_raw.length > 800 ? '…' : ''}</p></div>`
      : ''}
    ${item.url
      ? `<a class="modal-link" href="${esc(item.url)}" target="_blank" rel="noopener">🔗 Ver fuente original</a>`
      : ''}
  `;

  document.getElementById('modal-overlay').classList.add('open');
}

function cerrarModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) cerrarModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });

// ── Init ───────────────────────────────────────────────────────
const picker = document.getElementById('date-picker');
picker.value = hoy();
picker.max   = hoy();
picker.addEventListener('change', () => cargarFecha(picker.value));

cargarFecha(hoy());
cargarHistorial();
// Refrescar cada 5 minutos
setInterval(() => { cargarFecha(picker.value); cargarHistorial(); }, 5 * 60 * 1000);
</script>
